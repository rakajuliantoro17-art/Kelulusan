<script>
function showResult(nama){
  const clean = (nama || '').trim();
  if(!clean) return;

  const namaEl = document.getElementById("namaHasil");
  const statusEls = document.querySelectorAll(".status-text");
  const titleEl = document.querySelector(".lulus");

  namaEl.innerText = clean.toUpperCase();

  const flash = document.getElementById("flash");
  const overlay = document.getElementById("overlay");

  // FLASH
  flash.classList.remove("show");
  void flash.offsetWidth;
  flash.classList.add("show");

  setTimeout(()=>{
    overlay.classList.add("show");
  }, 250);

  // === MODE PRANK ===
  setTimeout(()=>{
    titleEl.innerText = "MAAF";
    titleEl.style.color = "#ffffff";

    statusEls[0].innerText = "ANDA DINYATAKAN";
    statusEls[1].innerText = "TIDAK LULUS";

  }, 500);

  // BALIK KE LULUS + GLITCH
  setTimeout(()=>{
    titleEl.innerText = "SELAMAT";
    titleEl.style.color = "#ff2b2b";

    statusEls[0].innerText = "ANDA DINYATAKAN LULUS";
    statusEls[1].innerText = "DARI SMAN 1 SOOKO";

    // efek glitch singkat
    overlay.style.animation = "glitch 0.2s 3";
    setTimeout(()=> overlay.style.animation = "", 600);

  }, 1500);

  // AUDIO
  const audio = document.getElementById("sound");
  audio.currentTime = 0;
  audio.volume = 0;
  audio.play().catch(()=>{});

  let vol = 0;
  const fade = setInterval(()=>{
    vol += 0.06;
    if(vol >= 1){
      audio.volume = 1;
      clearInterval(fade);
    } else {
      audio.volume = vol;
    }
  }, 90);

  // CONFETTI setelah balik ke LULUS
  setTimeout(()=>{
    confetti({particleCount:180, spread:100, origin:{y:0.6}});
  },1600);

  setTimeout(()=>{
    confetti({particleCount:120, spread:120, origin:{y:0.5}});
  },2000);
}

function cek(){
  const namaInput = document.getElementById("nama");
  const nama = namaInput.value.trim();
  const btn = document.querySelector("button");
  const loading = document.getElementById("loading");

  if(!nama){
    alert("Nama harus diisi");
    return;
  }

  btn.disabled = true;
  loading.style.display = "block";

  setTimeout(()=>{
    loading.style.display = "none";
    showResult(nama);
    btn.disabled = false;
  },1800);
}

/* AUTO LINK */
(function(){
  const params = new URLSearchParams(window.location.search);
  const nama = params.get('nama') || params.get('n');
  if(nama){
    document.getElementById("nama").value = nama;
    setTimeout(()=>showResult(nama), 400);
  }
})();

/* CLOSE */
document.addEventListener('click', function(e){
  if(e.target && e.target.id === 'btnClose'){
    document.getElementById("overlay").classList.remove("show");
  }
});
</script>
