<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cek Pengumuman Kelulusan — SMAN 1 Sooko Mojokerto</title>
<meta name="description" content="Portal resmi pengumuman kelulusan SMAN 1 Sooko Mojokerto. Masukkan NIS atau NISN untuk melihat hasil kelulusan Anda.">

<meta name="theme-color" content="#071A35">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/favicon.ico">
<link rel="apple-touch-icon" href="assets/icons/icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/glass.css">
<link rel="stylesheet" href="css/animation.css">
<link rel="stylesheet" href="css/responsive.css">

</head>
<body>

<div class="bg-layer" id="bgLayer"></div>

<div class="container">

    <header class="header">

        <img src="assets/logo/logo.png" alt="Logo SMAN 1 Sooko Mojokerto" class="logo">

        <h1>SMAN 1 Sooko Mojokerto<span>Pengumuman Kelulusan</span></h1>

        <p>Masukkan NIS atau NISN untuk melihat hasil kelulusan Anda.</p>

    </header>

    <section class="search-section">

        <div class="search-card">

            <span class="badge-year" id="badgeYear"></span>
            <h2>Cek Hasil Kelulusan</h2>

            <form id="searchForm" autocomplete="off">

                <input
                    type="text"
                    id="keyword"
                    name="keyword"
                    inputmode="numeric"
                    autocomplete="off"
                    required
                >

                <button type="submit">Lihat Hasil Kelulusan</button>

            </form>

        </div>

        <div id="result" class="hidden"></div>

    </section>

    <footer>

        SMAN 1 Sooko Mojokerto

        <small>&copy; 2026 SMANSASOO Graduation Portal</small>

    </footer>

</div>

<div class="flash" id="flash"></div>
<div id="balloons"></div>

<div class="overlay" id="overlay">
    <div class="result-box" id="overlayBox"></div>
</div>

<audio id="celebrationSound" preload="none"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/search.js"></script>
<script src="js/app.js"></script>

</body>
</html>
